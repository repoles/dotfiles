# Reset tmux options customized by this config before reapplying tmux.conf/style.conf.

# Status bar: layout/content
set -gu status-left
set -gu status-right
set -gu status-left-length
set -gu status-right-length
set -gu status-justify
set -gu status-position
set -gu status-interval

# Status bar: window list
setw -gu window-status-format
setw -gu window-status-current-format
setw -gu window-status-separator

# Status bar: styles
set -gu status-style
set -gu status-left-style
set -gu status-right-style
setw -gu window-status-style
setw -gu window-status-current-style

# Panes
setw -gu pane-border-style
setw -gu pane-active-border-style
setw -gu pane-border-status
setw -gu pane-border-format

# Copy mode, prompts and messages
setw -gu mode-style
set -gu message-style
set -gu message-command-style
set -gu display-time
set -gu display-panes-time
set -gu word-separators

# Window/session behavior
set -gu mouse
set -gu base-index
setw -gu pane-base-index
set -gu renumber-windows
setw -gu mode-keys

# Terminal title
set -gu set-titles
set -gu set-titles-string

# Window names
setw -gu allow-rename
setw -gu automatic-rename

# TPM/plugin options
set -gu @plugin
