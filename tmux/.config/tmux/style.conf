set -g status-style 'bg=colour234,fg=colour244'
setw -g window-status-current-style 'fg=colour254'

set -g status-left '[#{=10:#{session_name}}] '
set -g status-left-length 15

# replace the time and date with the host name
# windows with the @full_title option set (see the prefix+F1 binding) show the whole pane title and no host name
set -g status-right '#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}#{?@full_title, #{=/38/…:#{s|^✳ ||:pane_title}}, "#{=21:pane_title}" #{host_short}}'

# remove the extra space after the windows names
setw -g window-status-format '#I:#W#{?window_flags,#{window_flags},}' # format for inactive windows
setw -g window-status-current-format '#I:#W#{?window_flags,#{window_flags},}' # format for active window

# terminal title and current directory git status
# set -g status-right '"#{=21:pane_title}"#(fish --no-config $XDG_CONFIG_HOME/tmux/scripts/git-status.fish "#{pane_current_path}")'
